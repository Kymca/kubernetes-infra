---
# Часть 1: Описываем Deployment (наши контейнеры)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 3 # Хотим 3 копии сайта
  selector:
    matchLabels:
      app: my-nginx
  template:
    metadata:
      labels:
        app: my-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

---
# Часть 2: Описываем Service (доступ к контейнерам)
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: NodePort
  selector:
    app: my-nginx # Этот сервис ищет поды с таким ярлыком
  ports:
    - port: 80
      targetPort: 80
      nodePort: 32000 # ЖЕСТКО ФИКСИРУЕМ ПОРТ!
